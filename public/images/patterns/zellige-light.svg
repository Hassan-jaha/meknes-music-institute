<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <rect width="160" height="160" fill="#ffffff"/>
  <g fill="none" stroke="#003049" stroke-width="0.8" opacity="0.15">
    <!-- Motif Khatim (Étoile à 8 branches) -->
    <defs>
      <g id="khatim">
        <path d="M80 20 L95 65 L140 80 L95 95 L80 140 L65 95 L20 80 L65 65 Z"/>
        <rect x="55" y="55" width="50" height="50" transform="rotate(45 80 80)"/>
        <rect x="55" y="55" width="50" height="50"/>
      </g>
    </defs>
    
    <!-- Répétition en grille pour l'effet tapisserie -->
    <use href="#khatim" x="0" y="0"/>
    <use href="#khatim" x="80" y="80"/>
    <use href="#khatim" x="-80" y="-80"/>
    <use href="#khatim" x="80" y="-80"/>
    <use href="#khatim" x="-80" y="80"/>
    
    <!-- Entrelacs de liaison -->
    <path d="M0 0 L160 160 M160 0 L0 160 M80 0 L80 160 M0 80 L160 80" stroke-opacity="0.5"/>
  </g>
</svg>
